<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RAG Assistant{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="global-nav">
        <a href="/" class="global-nav-logo">
            <i class="bi bi-robot"></i> <span>RAG Assistant</span>
        </a>
        <div class="pill-nav">
            <a href="/" class="pill {{ 'active' if request.path == '/' else '' }}">Chat</a>
            <a href="/documents" class="pill {{ 'active' if request.path == '/documents' else '' }}">Knowledge Base</a>
            <a href="/admin" class="pill {{ 'active' if request.path == '/admin' else '' }}">Admin Panel</a>
        </div>
    </nav>

    <div class="app-shell">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
